{{ define "main" }}
<div class="post-container">
  <div class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
      <span>By <span class="post-author">{{ .Params.author }}</span></span>
      <span class="post-date">{{ .Date.Format "2006년 01월 02일" }}</span>
    </div>
    {{ with .GetTerms "tags" }}
    <div class="post-tags">
      {{ range . }}
        <a href="{{ .RelPermalink }}" class="post-tag">{{ .LinkTitle }}</a>
      {{ end }}
    </div>
    {{ end }}
  </div>
  <div class="post-content">
    {{ .Content }}
  </div>
  <div class="post-navigation">
    <a href="javascript:history.back()" class="back-to-blog">← 뒤로 가기</a>
  </div>
</div>
<script>
  document.querySelectorAll('.post-content table').forEach(function(table) {
    var wrapper = document.createElement('div');
    wrapper.className = 'table-wrapper';
    table.parentNode.insertBefore(wrapper, table);
    wrapper.appendChild(table);
  });

  // 코드블록 언어 뱃지 + 복사 버튼
  document.querySelectorAll('.post-content div.highlight').forEach(function(block) {
    // 언어 감지: Chroma 출력 <code class="language-bash"> 또는 <code class="language-xxx">
    var code = block.querySelector('code[class]');
    var lang = '';
    if (code) {
      var cls = Array.from(code.classList).find(function(c) { return c.startsWith('language-'); });
      if (cls) lang = cls.replace('language-', '');
    }
    // data-lang이 없으면 'code'로 표시
    block.setAttribute('data-lang', lang || 'code');

    // 복사 버튼 (position:absolute으로 헤더바 위에 렌더링)
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', function() {
      var codeEl = block.querySelector('code');
      var text = codeEl ? codeEl.innerText : '';
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    });
    block.appendChild(btn);
  });
</script>
{{ end }}

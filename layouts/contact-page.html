{{ define "main" }}
<div class="category-container">
  <div class="category-header">
    <h1>💬 Start a Conversation</h1>
    <p>궁금한 점이 있으시거나 협업을 원하신다면 언제든지 연락주세요!</p>
  </div>

  <!-- 챗봇 섹션 -->
  <div class="chatbot-section">
    <div class="post-card chatbot-card">
      <!-- Gradio WebComponent Embed -->
      <div class="chatbot-embed">
        <gradio-app src="https://skwltg90-career-conversation.hf.space"></gradio-app>
      </div>

      <a href="https://career-chatbot.bys.digital/" target="_blank" rel="noopener noreferrer" class="chatbot-link">
        🔗 새 창에서 열기
      </a>
    </div>
  </div>

  <script type="module" src="https://gradio.s3-us-west-2.amazonaws.com/5.9.1/gradio.js"></script>

  <div class="posts-grid">
    <div class="post-card">
      <div class="card-header">
        <h2>✉️ Send Message</h2>
      </div>
      <form action="https://formspree.io/f/mgepqqpv" method="POST">
        <div class="form-group">
          <input type="text" class="form-control" placeholder="Your Name" name="Name">
        </div>
        <div class="form-group">
          <input type="text" class="form-control" placeholder="Email Address" name="Email Address">
        </div>
        <div class="form-group">
          <input type="text" class="form-control" placeholder="Subject" name="Subject">
        </div>
        <div class="form-group">
          <textarea class="form-control" rows="3" placeholder="Your Message" name="Message"></textarea>
        </div>
        <button class="btn btn-default" type="submit">Send Message</button>
      </form>
    </div>

    <div class="post-card">
      <div class="card-header">
        <h2>📞 Get in Touch</h2>
      </div>

      <ul class="address-block">
        <li>
          <i class="fa fa-envelope-o"></i>
          <span>Email: <a href="mailto:skwltg90@naver.com">skwltg90@naver.com</a></span>
        </li>
        <li>
          <i class="fa fa-github"></i>
          <span>GitHub: <a href="https://github.com/byoungsoo" target="_blank">@byoungsoo</a></span>
        </li>
        <li>
          <i class="fa fa-globe"></i>
          <span>Blog: <a href="https://byoungsoo.github.io" target="_blank">byoungsoo.github.io</a></span>
        </li>
      </ul>

      <ul class="social-icons">
        <li>
          <a href="mailto:skwltg90@naver.com" title="Email">
            <i class="fa fa-envelope"></i>
          </a>
        </li>
        <li>
          <a href="https://github.com/byoungsoo" target="_blank" title="GitHub">
            <i class="fa fa-github"></i>
          </a>
        </li>
        <li>
          <a href="https://byoungsoo.github.io" target="_blank" title="Blog">
            <i class="fa fa-globe"></i>
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>
{{ end }}
